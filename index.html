<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maximiliano Zurita — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="layout">

    <!-- MAIN CONTENT -->
    <main class="main-content" id="main-content">

      <section class="section" id="summary-section">
        <h2 class="section-title">
          <span class="section-icon">◈</span> <span id="title-summary">Resumen</span>
        </h2>
        <p class="summary-text" id="summary"></p>
      </section>

      <section class="section" id="experience-section">
        <h2 class="section-title">
          <span class="section-icon">◈</span> <span id="title-experience">Experiencia</span>
        </h2>
        <div id="experience-list"></div>
      </section>

      <section class="section" id="skills-section">
        <h2 class="section-title">
          <span class="section-icon">◈</span> <span id="title-skills">Skills Técnicos</span>
        </h2>
        <div class="skills-grid" id="skills-grid"></div>
      </section>

      <section class="section" id="education-section">
        <h2 class="section-title">
          <span class="section-icon">◈</span> <span id="title-education">Educación</span>
        </h2>
        <div id="education-list"></div>
      </section>

      <section class="section" id="certifications-section">
        <h2 class="section-title">
          <span class="section-icon">◈</span> <span id="title-certifications">Certificaciones</span>
        </h2>
        <div id="certifications-list"></div>
      </section>

    </main>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">

        <div class="avatar" id="avatar">MZ</div>

        <h1 class="name" id="name">—</h1>
        <p class="current-role" id="current-role">—</p>

        <div class="contact-links" id="contact-links"></div>

        <div class="sidebar-section">
          <h3 class="sidebar-label" id="sidebar-label-location">Ubicación</h3>
          <p class="sidebar-value" id="location">—</p>
        </div>

        <div class="sidebar-section" id="languages-section">
          <h3 class="sidebar-label" id="sidebar-label-languages">Idiomas</h3>
          <div id="languages"></div>
        </div>

        <div class="sidebar-section" id="softskills-section">
          <h3 class="sidebar-label" id="sidebar-label-softskills">Soft Skills</h3>
          <div class="tags" id="soft-skills"></div>
        </div>

        <div class="controls-row">
          <div class="seg-control" id="theme-control" aria-label="Toggle theme">
            <button class="seg-btn" id="seg-dark">☾ Dark</button>
            <button class="seg-btn" id="seg-light">☀ Light</button>
          </div>
          <div class="seg-control" id="lang-control" aria-label="Switch language">
            <button class="seg-btn" id="seg-es">ES</button>
            <button class="seg-btn" id="seg-en">EN</button>
          </div>
        </div>

      </div>
    </aside>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
